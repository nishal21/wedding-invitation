[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# This routes your API calls to Netlify's serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# This fixes the React Router 404 issue
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
